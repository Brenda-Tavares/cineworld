<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - CineWorld</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-theme="dark">
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <a href="/" class="logo-area" style="text-decoration: none; cursor: pointer;">
                <div class="logo-box">
                    <div class="logo-text">CINEWORLD</div>
                    <span class="logo-sub" id="siteTagline">Descubra filmes e onde assistir</span>
                </div>
            </a>
            
            <div class="header-actions">
                <span class="lang-label" id="langLabel">Idioma</span>
                <select class="lang-select" id="langSelect" onchange="changeLanguage(this.value)">
                    <option value="pt-BR">Português</option>
                    <option value="en">English</option>
                    <option value="es">Español</option>
                    <option value="zh-CN">中文</option>
                    <option value="ja">日本語</option>
                    <option value="ru">Русский</option>
                    <option value="ko">한국어</option>
                </select>
                
                <div style="position: relative; display: flex; align-items: center; gap: 10px;">
                    <button class="login-btn" id="authBtn">
                        <i class="fas fa-user"></i>
                        <span id="authText">Entrar</span>
                    </button>
                    <div id="userMenu" class="user-menu" style="display: none;">
                        <div id="userMenuContent"></div>
                    </div>
                </div>
            </div>
        </div>
    </header>
    
    <!-- Profile Content -->
    <main class="main-content" style="padding: 40px 20px;">
        <div class="profile-container" style="max-width: 500px; margin: 0 auto;">
            <h1 id="profileTitle" style="color: var(--text); margin-bottom: 30px; text-align: center;">Meu Perfil</h1>
            
            <div class="profile-card" style="background: var(--secondary); padding: 30px; border-radius: 12px; border: 1px solid var(--border);">
                <div style="text-align: center; margin-bottom: 25px;">
                    <i class="fas fa-user-circle" style="font-size: 80px; color: var(--accent);"></i>
                </div>
                
                <div class="profile-field" style="margin-bottom: 20px;">
                    <label id="profileNameLabel" style="color: var(--text-muted); font-size: 0.85rem; display: block; margin-bottom: 5px;">Nome</label>
                    <div id="profileName" style="color: var(--text); font-size: 1.1rem; padding: 10px; background: var(--bg-hover); border-radius: 8px;">-</div>
                </div>
                
                <div class="profile-field" style="margin-bottom: 25px;">
                    <label id="profileEmailLabel" style="color: var(--text-muted); font-size: 0.85rem; display: block; margin-bottom: 5px;">Email</label>
                    <div id="profileEmail" style="color: var(--text); font-size: 1rem; padding: 10px; background: var(--bg-hover); border-radius: 8px;">-</div>
                </div>
                
                <a href="#" onclick="goToFavorites(event)" class="profile-btn" style="display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px; background: var(--accent); color: white; border-radius: 8px; text-decoration: none; margin-bottom: 15px; font-weight: 600;">
                    <i class="fas fa-heart"></i>
                    <span id="profileFavoritesText">Meus Favoritos</span>
                </a>
                
                <a href="#" onclick="goToChangePassword(event)" class="profile-btn" style="display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px; background: var(--primary); color: white; border-radius: 8px; text-decoration: none; margin-bottom: 15px; font-weight: 600;">
                    <i class="fas fa-key"></i>
                    <span id="profileChangePasswordText">Alterar Senha</span>
                </a>
                
                <button onclick="logout()" class="profile-btn" style="display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px; background: transparent; color: var(--text-muted); border: 1px solid var(--border); border-radius: 8px; width: 100%; cursor: pointer;">
                    <i class="fas fa-sign-out-alt"></i>
                    <span id="profileLogoutText">Sair</span>
                </button>
            </div>
            
            <div style="text-align: center; margin-top: 20px;">
                <a href="/" style="color: var(--accent); text-decoration: none;">
                    <i class="fas fa-arrow-left"></i> 
                    <span id="backHomeText">Voltar ao início</span>
                </a>
            </div>
        </div>
    </main>
    
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const savedUser = localStorage.getItem('cineworld_user');
            if (!savedUser) {
                window.location.href = '/';
                return;
            }
            
            const user = JSON.parse(savedUser);
            document.getElementById('profileName').textContent = user.name;
            document.getElementById('profileEmail').textContent = user.email;
            updateAuthUI();
        });
        
        function goToFavorites(e) {
            e.preventDefault();
            window.location.href = '/favoritos';
        }
        
        function goToChangePassword(e) {
            e.preventDefault();
            window.location.href = '/alterar-senha';
        }
    </script>
</body>
</html>
