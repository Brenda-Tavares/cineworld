<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Favoritos - CineWorld</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-theme="dark">
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <a href="/" class="logo-area" style="text-decoration: none; cursor: pointer;">
                <div class="logo-box">
                    <div class="logo-text">CINEWORLD</div>
                    <span class="logo-sub">Descubra filmes e onde assistir</span>
                </div>
            </a>
            
            <div class="header-actions">
                <span class="lang-label">Idioma</span>
                <select class="lang-select" onchange="changeLanguage(this.value)">
                    <option value="pt-BR">Português</option>
                    <option value="en">English</option>
                    <option value="es">Español</option>
                </select>
                
                <div style="position: relative; display: flex; align-items: center; gap: 10px;">
                    <button class="login-btn" id="authBtn" onclick="toggleUserMenu()">
                        <i class="fas fa-user"></i>
                        <span id="authText">Entrar</span>
                    </button>
                    <div id="userMenu" class="user-menu" style="display: none;">
                        <div id="userMenuContent"></div>
                    </div>
                </div>
            </div>
        </div>
    </header>
    
    <!-- Favorites Content -->
    <main class="main-content" style="padding: 40px 20px;">
        <div class="movies-section">
            <h2 id="favoritesTitle" style="color: var(--text); margin-bottom: 30px; text-align: center;">
                <i class="fas fa-heart" style="color: var(--accent);"></i> Meus Favoritos
            </h2>
            
            <div id="favoritesGrid" class="movies-grid">
                <!-- Movies will be loaded here -->
            </div>
            
            <div id="emptyFavorites" style="text-align: center; padding: 60px 20px; display: none;">
                <i class="fas fa-heart-broken" style="font-size: 60px; color: var(--text-muted); margin-bottom: 20px;"></i>
                <p id="emptyFavoritesText" style="color: var(--text-muted); font-size: 1.1rem;">Você ainda não tem filmes favoritos!</p>
                <a href="/" style="display: inline-block; margin-top: 20px; padding: 12px 24px; background: var(--accent); color: white; border-radius: 8px; text-decoration: none;">
                    Explorar Filmes
                </a>
            </div>
            
            <div style="text-align: center; margin-top: 30px;">
                <a href="/perfil" style="color: var(--accent); text-decoration: none;">
                    <i class="fas fa-arrow-left"></i> Voltar ao Perfil
                </a>
            </div>
        </div>
    </main>
    
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const savedUser = localStorage.getItem('cineworld_user');
            if (!savedUser) {
                window.location.href = '/';
                return;
            }
            
            const savedFavs = localStorage.getItem('cineworld_favorites');
            const favIds = savedFavs ? JSON.parse(savedFavs) : [];
            
            const lang = localStorage.getItem('cineworld_language') || 'pt-BR';
            state.currentLanguage = lang;
            
            applyPageTranslations();
            updateAuthUI();
            
            if (favIds.length === 0) {
                document.getElementById('favoritesGrid').style.display = 'none';
                document.getElementById('emptyFavorites').style.display = 'block';
            } else {
                loadFavoriteMovies(favIds);
            }
        });
        
        function applyPageTranslations() {
            document.getElementById('favoritesTitle').innerHTML = '<i class="fas fa-heart" style="color: var(--accent);"></i> ' + (t('favoritesTitle') || 'Meus Favoritos');
            document.getElementById('emptyFavoritesText').textContent = t('emptyFavoritesText') || 'Você ainda não tem filmes favoritos！';
        }
        
        async function loadFavoriteMovies(ids) {
            const grid = document.getElementById('favoritesGrid');
            const lang = localStorage.getItem('cineworld_language') || 'pt-BR';
            
            try {
                const response = await fetch(`/api/movies?language=${lang}&ids=${ids.join(',')}`);
                const data = await response.json();
                
                if (data.results && data.results.length > 0) {
                    grid.innerHTML = data.results.map(movie => `
                        <div class="movie-card" onclick="showMovieDetails(${movie.id})">
                            <div class="poster-container">
                                ${movie.poster_path ? 
                                    `<img src="${movie.poster_path}" alt="${movie.title}" loading="lazy">` : 
                                    `<div class="no-poster"><i class="fas fa-film"></i></div>`
                                }
                                <div class="movie-info">
                                    <span class="rating"><i class="fas fa-star"></i> ${movie.vote_average?.toFixed(1) || 'N/A'}</span>
                                </div>
                            </div>
                            <div class="movie-details">
                                <h3>${movie.title}</h3>
                                ${movie.release_date ? `<span class="year">${movie.release_date.split('-')[0]}</span>` : ''}
                            </div>
                        </div>
                    `).join('');
                } else {
                    grid.style.display = 'none';
                    document.getElementById('emptyFavorites').style.display = 'block';
                }
            } catch (error) {
                console.error('Error loading favorites:', error);
                grid.innerHTML = '<p style="color: var(--text-muted); text-align: center;">' + (t('errorLoading') || 'Erro ao carregar favoritos') + '</p>';
            }
        }
    </script>
</body>
</html>
