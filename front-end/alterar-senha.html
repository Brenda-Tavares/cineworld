<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterar Senha - CineWorld</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-theme="dark">
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <a href="/" class="logo-area" style="text-decoration: none; cursor: pointer;">
                <div class="logo-box">
                    <div class="logo-text">CINEWORLD</div>
                    <span class="logo-sub">Descubra filmes e onde assistir</span>
                </div>
            </a>
            
            <div class="header-actions">
                <span class="lang-label">Idioma</span>
                <select class="lang-select" onchange="changeLanguage(this.value)">
                    <option value="pt-BR">Português</option>
                    <option value="en">English</option>
                    <option value="es">Español</option>
                </select>
                
                <div style="position: relative; display: flex; align-items: center; gap: 10px;">
                    <button class="login-btn" id="authBtn" onclick="toggleUserMenu()">
                        <i class="fas fa-user"></i>
                        <span id="authText">Entrar</span>
                    </button>
                    <div id="userMenu" class="user-menu" style="display: none;">
                        <div id="userMenuContent"></div>
                    </div>
                </div>
            </div>
        </div>
    </header>
    
    <!-- Change Password Content -->
    <main class="main-content" style="padding: 40px 20px;">
        <div class="profile-container" style="max-width: 400px; margin: 0 auto;">
            <h1 id="changePasswordTitle" style="color: var(--text); margin-bottom: 30px; text-align: center;">
                <i class="fas fa-key" style="color: var(--accent);"></i> Alterar Senha
            </h1>
            
            <div class="profile-card" style="background: var(--secondary); padding: 30px; border-radius: 12px; border: 1px solid var(--border);">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label id="currentPasswordLabel" style="color: var(--text-muted); font-size: 0.85rem; display: block; margin-bottom: 8px;">Senha Atual</label>
                    <input type="password" id="currentPassword" style="width: 100%; padding: 12px; background: var(--bg-hover); border: 1px solid var(--border); border-radius: 8px; color: white; font-size: 1rem;">
                </div>
                
                <div class="form-group" style="margin-bottom: 20px;">
                    <label id="newPasswordLabel" style="color: var(--text-muted); font-size: 0.85rem; display: block; margin-bottom: 8px;">Nova Senha</label>
                    <input type="password" id="newPassword" style="width: 100%; padding: 12px; background: var(--bg-hover); border: 1px solid var(--border); border-radius: 8px; color: white; font-size: 1rem;">
                </div>
                
                <div class="form-group" style="margin-bottom: 25px;">
                    <label id="confirmNewPasswordLabel" style="color: var(--text-muted); font-size: 0.85rem; display: block; margin-bottom: 8px;">Confirmar Nova Senha</label>
                    <input type="password" id="confirmNewPassword" style="width: 100%; padding: 12px; background: var(--bg-hover); border: 1px solid var(--border); border-radius: 8px; color: white; font-size: 1rem;">
                </div>
                
                <button onclick="changePassword()" id="changePasswordBtn" style="width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer;">
                    Alterar Senha
                </button>
                
                <div id="passwordMessage" style="margin-top: 15px; text-align: center; display: none;"></div>
            </div>
            
            <div style="text-align: center; margin-top: 20px;">
                <a href="/perfil" style="color: var(--accent); text-decoration: none;">
                    <i class="fas fa-arrow-left"></i> Voltar ao Perfil
                </a>
            </div>
        </div>
    </main>
    
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const savedUser = localStorage.getItem('cineworld_user');
            if (!savedUser) {
                window.location.href = '/';
                return;
            }
            
            updateAuthUI();
        });
        
        function changePassword() {
            const current = document.getElementById('currentPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmNewPassword').value;
            const msg = document.getElementById('passwordMessage');
            
            if (!current || !newPass || !confirmPass) {
                msg.style.display = 'block';
                msg.style.color = 'var(--accent)';
                msg.textContent = 'Preencha todos os campos!';
                return;
            }
            
            if (newPass.length < 4) {
                msg.style.display = 'block';
                msg.style.color = 'var(--accent)';
                msg.textContent = 'A nova senha deve ter pelo menos 4 caracteres!';
                return;
            }
            
            if (newPass !== confirmPass) {
                msg.style.display = 'block';
                msg.style.color = 'var(--accent)';
                msg.textContent = 'As senhas não coincidem!';
                return;
            }
            
            // Get current user and users list
            const savedUser = JSON.parse(localStorage.getItem('cineworld_user'));
            const users = JSON.parse(localStorage.getItem('cineworld_users') || '[]');
            
            // Verify current password
            const userIndex = users.findIndex(u => u.email === savedUser.email);
            if (userIndex === -1 || users[userIndex].password !== current) {
                msg.style.display = 'block';
                msg.style.color = 'var(--accent)';
                msg.textContent = 'Senha atual incorreta!';
                return;
            }
            
            // Update password
            users[userIndex].password = newPass;
            localStorage.setItem('cineworld_users', JSON.stringify(users));
            
            msg.style.display = 'block';
            msg.style.color = '#4CAF50';
            msg.textContent = 'Senha alterada com sucesso!';
            
            // Clear fields
            document.getElementById('currentPassword').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmNewPassword').value = '';
        }
    </script>
</body>
</html>
