<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于 - CineWorld</title>
<link rel="stylesheet" href="/front-end/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: var(--bg-dark) !important; }
        .legal-page { max-width: 800px; margin: 0 auto; padding: 40px 20px 80px; }
        .legal-page h1 { font-size: 2rem; margin-bottom: 30px; color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 15px; }
        .legal-page h2 { font-size: 1.3rem; margin: 30px 0 15px; color: var(--accent); }
        .legal-page p, .legal-page li { line-height: 1.8; margin-bottom: 15px; color: var(--text-light); }
        .legal-page a { color: var(--accent); text-decoration: none; }
        .back-link { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 30px; color: var(--accent); text-decoration: none; font-weight: 500; }
        .back-link:hover { color: var(--primary-light); }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="/" class="logo-area" style="text-decoration: none; cursor: pointer;">
                <div class="logo-box">
                    <i class="fas fa-play"></i>
                </div>
                <div>
                    <div class="logo-text">CINEWORLD</div>
                    <span class="logo-sub">发现电影和在哪里观看</span>
                </div>
            </a>
            
            <div id="langSelectorContainer"></div>
        </div>
    </header>
    <div class="legal-page">
        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> 返回首页</a>
        <h1><i class="fas fa-film"></i> 关于 CineWorld</h1>
        <p>CineWorld是一个电影发现网站，帮助您找到下一部想看的电影。</p>
        <h2><i class="fas fa-star"></i> 我们的使命</h2>
        <p>简化电影和电视剧的搜索，提供直观的体验来发现新内容。</p>
        <h2><i class="fas fa-heart"></i> 我们提供</h2>
        <ul>
            <li>完整的电影和电视剧目录</li>
            <li>流媒体平台信息</li>
            <li>人工智能驱动的智能搜索</li>
            <li>收藏和历史记录</li>
        </ul>
        <p style="margin-top: 30px;"><em>最后更新：2026</em></p>
        <p style="font-size:0.8rem;color:var(--text-muted);margin-top:15px;max-width:800px;margin-left:auto;margin-right:auto;line-height:1.5;">
            CineWorld不托管任何视频文件。所有内容均由TMDB官方API提供。
            观看链接指向合法的流媒体平台（Netflix、Prime Video、Disney+等）。
        </p>
    </div>

    <script src="/front-end/js/lang-selector.js" defer></script>
</body>
</html>
